# config.yml

confirm-cooldown-ticks: 2
use-actionbars: false
play-open-sound: false

enable-messages: true
messages:
  purchase-success: "&#10a5ebĐã mua %clicked-amount% %clicked-item-name% với giá %total-price%!"
  no-permission: "&cBạn không có quyền sử dụng lệnh này."
  not-enough: "&cBạn cần %total-price% nhưng chỉ có %balance%"


sounds:
  open-sound: "UI_TOAST_IN"
  click-sound: "UI_BUTTON_CLICK"
  buy-sound: "ENTITY_EXPERIENCE_ORB_PICKUP"
  decline-sound: "ENTITY_VILLAGER_NO"

mysql:
  enabled: false
  host: "localhost"
  port: 3306
  database: "database"
  username: "username"
  password: "password"

# Bat/tat toan bo tinh nang log Discord webhook. Link webhook duoc dien rieng trong tung file shops/*.yml
