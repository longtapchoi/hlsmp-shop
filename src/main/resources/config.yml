# config.yml

confirm-cooldown-ticks: 2
use-actionbars: false
play-open-sound: false

enable-messages: true
messages:
  purchase-success: "&#10a5ebYou bought %clicked-amount% %clicked-item-name% for %total-price%!"
  no-permission: "&cYou don’t have permission."
  not-enough: "&cYou need %total-price% but have %balance%"


sounds:
  open-sound: "UI_TOAST_IN"
  click-sound: "UI_BUTTON_CLICK"
  buy-sound: "ENTITY_EXPERIENCE_ORB_PICKUP"
  decline-sound: "ENTITY_VILLAGER_NO"

mysql:
  enabled: false
  host: "localhost"
  port: 3306
  database: "database"
  username: "username"
  password: "password"

# Bat/tat toan bo tinh nang log Discord webhook. Link webhook duoc dien rieng trong tung file shops/*.yml
discord:
  enabled: true


main-menu:
  rows: 3
  title: '&#444444ѕʜᴏᴘ'
  categories:

    end:
      slot: 11
      displayname: '&#0bf592ᴇɴᴅ'
      material: END_STONE
      action: end
      command: ""
      lore:
        - '&fClick to view end shop'
    nether:
      slot: 12
      displayname: '&#0bf592ɴᴇᴛʜᴇʀ'
      material: NETHERRACK
      action: nether
      command: ""
      lore:
        - '&fClick to view nether shop'
    gear:
      slot: 13
      displayname: '&#0bf592ɢᴇᴀʀ'
      material: TOTEM_OF_UNDYING
      action: gear
      command: ""
      lore:
        - '&fClick to view gear shop'
    Food:
      slot: 14
      displayname: '&#0bf592ꜰᴏᴏᴅ'
      material: COOKED_BEEF
      action: food
