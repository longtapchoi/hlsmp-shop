confirm-menu:
  rows: 3
  use-small-font-title: true
  title: '&#444444buying {item-name}'
  confirm-purchase:
    material: LIME_STAINED_GLASS_PANE
    slot: 23
    displayname: '&#0bf52bᴄᴏɴꜰɪʀᴍ'
    lore:
      - "&fClick to buy"
    action: confirm
  decline-purchase:
    material: RED_STAINED_GLASS_PANE
    slot: 21
    lore:
      - "&fClick to cancel"
    displayname: '&#f5240bʙᴀᴄᴋ'
    action: back
  item-purchase:
    material: '%clicked-item%'
    amount: '%clicked-amount%'
    slot: 13
    lore:
      - '&fBuy Price: &#0bf52b%total-price%'
  add1:
    material: LIME_STAINED_GLASS_PANE
    slot: 15
    amount: 1
    displayname: '&#0bf52bAdd 1'
    action: add1
  add10:
    material: LIME_STAINED_GLASS_PANE
    slot: 16
    amount: 10
    displayname: '&#0bf52bAdd 10'
    action: add10
  add64:
    material: LIME_STAINED_GLASS_PANE
    slot: 17
    amount: 64
    displayname: '&#0bf52bSet to 64'
    action: add64
  remove1:
    material: RED_STAINED_GLASS_PANE
    slot: 11
    amount: 1
    displayname: '&#f5240bRemove 1'
    action: remove1
  remove10:
    material: RED_STAINED_GLASS_PANE
    slot: 10
    amount: 10
    displayname: '&#f5240bRemove 10'
    action: remove10
  remove64:
    material: RED_STAINED_GLASS_PANE
    slot: 9
    amount: 64
    displayname: '&#f5240bSet to 1'
    action: remove64


